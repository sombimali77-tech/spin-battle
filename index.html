<head>
    <style>
        /* Add this to your existing <style> block */
        .arrow-indicator {
            width: 0; 
            height: 0; 
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff0000; /* Bright red arrow */
            position: absolute;
            top: -50px; /* Positions it just above the wheel */
            z-index: 20;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
        }

        #wheel-wrapper {
            position: relative; /* This holds the arrow in place */
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div id="wheel-wrapper">
        <div class="arrow-indicator"></div> 
        <div id="wheel">
            <img src="ronaldo.jpg" class="img-seg">
            <img src="messi.jpg" class="img-seg">
        </div>
    </div>
    </body>
