<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; min-height: 100vh; }
        
        /* Match Table */
        #match-container { width: 100%; max-width: 400px; background: #252525; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .match-row { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 5px 0; font-size: 14px; }
        
        /* Wheel */
        .wheel-wrapper { position: relative; width: 200px; height: 200px; margin: 20px 0; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #ffd700; background: conic-gradient(#ff4d4d 0deg 180deg, #4d94ff 180deg 360deg); transition: transform 30s cubic-bezier(0.15, 0, 0, 1); }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); color: #ffd700; font-size: 24px; }
        
        /* Score & Controls */
        #scoreboard { font-size: 16px; margin-bottom: 10px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 10px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        
        /* Winner Display */
        #winner-box { display: none; flex-direction: column; align-items: center; margin-top: 10px; }
        #winner-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #ffd700; }
    </style>
</head>
<body>

    <div id="match-container">
        <div class="match-row"><span>Spain vs Austria</span><span>15:00 (NPT)</span></div>
        <div class="match-row"><span>Portugal vs Croatia</span><span>19:00 (NPT)</span></div>
    </div>

    <div id="scoreboard">Ronaldo: <span id="score-Ronaldo">0</span> | Messi: <span id="score-Messi">0</span></div>

    <div class="wheel-wrapper">
        <div class="pointer">▼</div>
        <div id="wheel"></div>
    </div>

    <div class="controls">
        <button onclick="announceWinner('Ronaldo')" style="background:#ff4d4d">Ronaldo</button>
        <button onclick="announceWinner('Messi')" style="background:#4d94ff">Messi</button>
        <button onclick="document.getElementById('star-sound').play()" style="background:#ffd700">⭐ Star</button>
        <button onclick="spin()" style="background:#444">Spin</button>
        <button onclick="document.getElementById('custom-sound').play()" style="background:#888">Custom</button>
    </div>

    <div id="winner-box">
        <img id="winner-img" src="" alt="Winner">
        <h3>WINNER!</h3>
    </div>

    <audio id="win-sound" src="win.mp3"></audio>
    <audio id="star-sound" src="star.mp3"></audio>
    <audio id="spin-sound" src="spin.mp3"></audio>
    <audio id="custom-sound" src="YOUR_CUSTOM_FILE.mp3"></audio>

    <script>
        const images = { Ronaldo: "ronaldo.jpg", Messi: "messi.jpg" };
        
        function spin() {
            const wheel = document.getElementById('wheel');
            document.getElementById('spin-sound').play();
            // Reset transition and position for new spin
            wheel.style.transition = 'none';
            wheel.style.transform = 'rotate(0deg)';
            
            setTimeout(() => {
                wheel.style.transition = 'transform 30s cubic-bezier(0.15, 0, 0, 1)';
                wheel.style.transform = `rotate(${Math.floor(Math.random() * 5000) + 3000}deg)`;
            }, 50);
        }

        function announceWinner(winner) {
            document.getElementById('score-' + winner).innerText = parseInt(document.getElementById('score-' + winner).innerText) + 1;
            document.getElementById('winner-img').src = images[winner];
            document.getElementById('winner-box').style.display = 'flex';
            document.getElementById('win-sound').play();
        }
    </script>
</body>
</html>
